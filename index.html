        // FRACTIONS
        const fractionMap = {

        async function startVoice() {
            let ok = await checkAccess();
            if (!ok) return;

      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = "hi-IN";

            recognition.onresult = function (event) {
                let text = event.results[0][0].transcript;
                processSpeech(text);
            };

            recognition.start();
        }
        // 🔥 COMBINE BOTH
        let rateList = {kiranaRates, fruitRates };
        // 🔥 MAIN LOGIC
        function processSpeech(text) {

            text = text.replace(/[.,।]/g, "").trim();

            // fix 2 5 → 2.5
            text = text.replace(/(\d+)\s+(\d+)/g, "$1.$2");

            let words = text.split(" ");

            let qty = 1;
            let price = 0;
            let itemWords = [];

            // FRACTIONS
            words.forEach(w => {
                if (fractionMap[w]) qty = fractionMap[w];
        });

        // NUMBERS
        let nums = words.filter(w => !isNaN(w));

        if (nums.length >= 1 && qty === 1) {
            qty = parseFloat(nums[0]);
        }

        if (nums.length >= 2) {
            price = parseFloat(nums[nums.length - 1]);
        }

        // ITEM DETECT
        words.forEach(w => {

            if (!isNaN(w) || fractionMap[w]) return;

        if (["किलो", "kg", "पैकेट", "पीस", "नग"].includes(w)) return;

        if (["ग्राम", "g"].includes(w)) {
            qty = qty * 0.001;
            return;
        }

        itemWords.push(w);
        });

        let item = itemWords.join(" ").trim().replace(/\s+/g, " ");

        if (!item) {
            console.log("Item not detected:", text);
            return;
        }

        // =========================
        // 🔥 FIXED SMART MATCH
        // =========================

        let found = null;
        let category = "";

        // 🔥 sort longest first
        let allKirana = Object.keys(kiranaRates).sort((a, b) => b.length - a.length);
        let allFruits = Object.keys(fruitRates).sort((a, b) => b.length - a.length);

        // ✅ 1. EXACT MATCH (BEST PRIORITY)
        if (kiranaRates[item]) {
            found = item;
            category = "kirana";
        }
        else if (fruitRates[item]) {
            found = item;
            category = "fruit";
        }

            // ✅ 2. PARTIAL MATCH (KIRANA)
        else {
            for (let k of allKirana) {
                if (item.includes(k)) {
                    found = k;
                    category = "kirana";
                    break;
            }
        }
        }

        // ✅ 3. PARTIAL MATCH (FRUIT)
        if (!found) {
            for (let k of allFruits) {
                if (item.includes(k)) {
                    found = k;
                    category = "fruit";
                    break;
            }
        }
        }

        // ✅ FINAL ASSIGN
        if (found) {
            item = found;
        }

        // AUTO PRICE
        if (!price && found) {
            if (category === "kirana") price = kiranaRates[found];
            if (category === "fruit") price = fruitRates[found];
        }

        if (!price) price = 0;

        // DEBUG (optional)
        console.log("Final:", item, qty, price, category);

        addItem(item, qty, price, category);
        }
        // ADD / MERGE
            function addItem(name, qty, price, category = "") {

                let existing = items.find(i => i.name == name && i.price == price);

                if (existing) {
                    existing.qty += qty;
                } else {
                    items.push({ name, qty, price, category });
                }

                render();
            }

        // RENDER
        function render() {

            let html = "";
            let total = 0;

            items.forEach((x, i) => {

                let amt = x.qty * x.price;

                html += `
<tr>
<td><input value="${x.name}" onchange="items[${i}].name=this.value"></td>
<td><input type="number" value="${x.qty}" onchange="items[${i}].qty=this.value;render()"></td>
<td><input type="number" value="${x.price}" onchange="items[${i}].price=this.value;render()"></td>
<td>₹${amt.toFixed(2)}</td>
<td><button onclick="del(${i})">X</button></td>
</tr>`;

                total += amt;
            });

            document.getElementById("bill").innerHTML = html;
            document.getElementById("total").innerText = "₹" + total.toFixed(2);
        }

        function del(i) {
            items.splice(i, 1);
            render();
        }

       window.checkAccess = async function () {

    const deviceId = getDeviceId();

    const snapshot = await getDocs(collection(db, "subscriptions"));

    let user = null;

    snapshot.forEach((doc) => {
        let data = doc.data();

        if (data.deviceId === deviceId) {
            user = data;
        }
    });

    if (!user) {
        alert("पहले shop save करो");
        return false;
    }

    let now = new Date();
    let expiry = user.expiryDate.toDate();
    expiry.setHours(23,59,59,999);

        return false;
    }
